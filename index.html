<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM Server Info</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b10;
    --bg2:     #0d1119;
    --bg3:     #131921;
    --bg4:     #1a2130;
    --border:  #1e2d45;
    --accent:  #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --glow:    rgba(0,212,255,0.18);
    --text:    #c8d8f0;
    --dim:     #4a6080;
    --premium: #ffd700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ═══ CUSTOM SCROLLBARS ═══ */
  ::-webkit-scrollbar              { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track        { background: var(--bg3); border-left: 1px solid var(--border); }
  ::-webkit-scrollbar-thumb        { background: var(--accent); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover  { background: #fff; box-shadow: 0 0 6px var(--accent); }
  ::-webkit-scrollbar-corner       { background: var(--bg3); }
  * { scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg3); }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Grid bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  /* Scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* CORNERS */
  .corner-deco { position: fixed; width: 60px; height: 60px; pointer-events: none; z-index: 100; opacity: 0.7; }
  .corner-deco::before, .corner-deco::after { content: ''; position: absolute; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .corner-deco::before { width: 2px; height: 32px; top: 0; left: 0; }
  .corner-deco::after  { width: 32px; height: 2px; top: 0; left: 0; }
  .corner-deco.tl { top:14px; left:14px; }
  .corner-deco.tr { top:14px; right:14px; transform:scaleX(-1); }
  .corner-deco.bl { bottom:14px; left:14px; transform:scaleY(-1); }
  .corner-deco.br { bottom:14px; right:14px; transform:scale(-1,-1); }

  .wrapper { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 44px 24px 60px; }

  /* SEARCH SECTION */
  .search-section { text-align: center; margin-bottom: 44px; animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) both; }
  .brand { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 8px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; opacity: 0.8; }
  h1 { font-size: 48px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #fff; line-height: 1; margin-bottom: 6px; text-shadow: 0 0 40px rgba(0,212,255,0.25), 0 0 80px rgba(0,212,255,0.1); }
  h1 .hl { color: var(--accent); }
  .subtitle { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--dim); letter-spacing: 2px; margin-bottom: 28px; }

  .search-box { display: flex; max-width: 580px; margin: 0 auto; position: relative; }
  .search-box::before { content: ''; position: absolute; inset: -1px; background: linear-gradient(90deg, var(--accent), var(--accent2)); z-index: -1; opacity: 0.5; transition: opacity 0.3s; }
  .search-box:focus-within::before { opacity: 1; }
  .search-box input { flex: 1; background: var(--bg2); border: none; outline: none; padding: 15px 22px; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--text); letter-spacing: 1px; transition: background 0.2s; }
  .search-box input:focus { background: var(--bg3); }
  .search-box input::placeholder { color: var(--dim); }
  .search-box button { background: var(--accent); border: none; padding: 15px 32px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--bg); transition: all 0.2s; position: relative; overflow: hidden; }
  .search-box button::after { content: ''; position: absolute; inset: 0; background: #fff; transform: translateX(-100%); transition: transform 0.3s; }
  .search-box button:hover::after { transform: translateX(0); }
  .search-box button span { position: relative; z-index: 1; }

  /* STATUS */
  #status-bar { text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--dim); min-height: 28px; margin-bottom: 20px; letter-spacing: 1px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #status-bar.loading { color: var(--accent); }
  #status-bar.error   { color: var(--accent2); }
  #status-bar.success { color: var(--accent3); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; flex-shrink: 0; }
  .loading .spinner { display: block; }

  #result { display: none; }
  /* staggered reveal */
  #result > * { opacity: 0; animation: revealUp 0.5s ease forwards; }
  #result > *:nth-child(1) { animation-delay:0.03s; }
  #result > *:nth-child(2) { animation-delay:0.08s; }
  #result > *:nth-child(3) { animation-delay:0.13s; }
  #result > *:nth-child(4) { animation-delay:0.18s; }
  #result > *:nth-child(5) { animation-delay:0.23s; }
  #result > *:nth-child(6) { animation-delay:0.28s; }
  #result > *:nth-child(7) { animation-delay:0.33s; }
  #result > *:nth-child(8) { animation-delay:0.38s; }
  #result > *:nth-child(9) { animation-delay:0.43s; }

  /* BANNER */
  .banner-wrap { width: 100%; height: 200px; overflow: hidden; position: relative; margin-bottom: -2px; background: var(--bg3); }
  .banner-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,11,16,0.1) 0%, var(--bg) 100%); }

  /* MAIN CARD */
  .main-card { background: var(--bg2); border: 1px solid var(--border); padding: 28px 32px; position: relative; margin-bottom: 16px; overflow: hidden; }
  .main-card::before { content: ''; position: absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3), var(--accent)); background-size: 200% 100%; animation: shimmer 4s linear infinite; }
  .main-card::after { content: ''; position: absolute; inset:0; background: radial-gradient(ellipse at top left, rgba(0,212,255,0.04), transparent 60%); pointer-events:none; }
  .server-header { display: flex; align-items: flex-start; gap: 20px; }
  .owner-avatar { width:68px; height:68px; border-radius:50%; border:2px solid var(--accent); box-shadow:0 0 16px rgba(0,212,255,0.3); flex-shrink:0; animation:avatarPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
  .server-title { flex: 1; }
  .server-name { font-size:30px; font-weight:700; letter-spacing:1px; color:#fff; line-height:1.1; }
  .server-desc { font-size:14px; color:var(--dim); margin-top:4px; }
  .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .badge { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1.5px; padding:3px 10px; border:1px solid; text-transform:uppercase; transition:box-shadow 0.2s; }
  .badge:hover { box-shadow:0 0 8px currentColor; }
  .badge.premium  { border-color:var(--premium); color:var(--premium); }
  .badge.locale   { border-color:var(--accent);  color:var(--accent); }
  .badge.onesync  { border-color:var(--accent3); color:var(--accent3); }
  .badge.gamebuild{ border-color:var(--accent2); color:var(--accent2); }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:16px; }
  .stat-cell { background:var(--bg2); padding:18px 20px; position:relative; overflow:hidden; transition:background 0.2s; cursor:default; }
  .stat-cell::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:var(--accent); transform:scaleX(0); transition:transform 0.3s; transform-origin:left; }
  .stat-cell:hover { background:var(--bg3); }
  .stat-cell:hover::after { transform:scaleX(1); }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
  .stat-value { font-size:24px; font-weight:700; color:#fff; line-height:1; }
  .stat-value.accent  { color:var(--accent);  text-shadow:0 0 12px rgba(0,212,255,0.4); }
  .stat-value.accent2 { color:var(--accent2); text-shadow:0 0 12px rgba(255,107,53,0.4); }
  .stat-value.accent3 { color:var(--accent3); text-shadow:0 0 12px rgba(127,255,107,0.4); }

  /* PLAYER BAR */
  .player-bar-wrap { background:var(--bg2); border:1px solid var(--border); padding:18px 22px; margin-bottom:16px; }
  .player-bar-label { display:flex; justify-content:space-between; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--dim); margin-bottom:10px; }
  .player-bar-label span:last-child { color:var(--accent); }
  .bar-track { height:8px; background:var(--bg4); border:1px solid var(--border); position:relative; overflow:hidden; }
  .bar-track::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(255,255,255,0.02) 10px,rgba(255,255,255,0.02) 11px); }
  .bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); box-shadow:0 0 14px rgba(0,212,255,0.5); transition:width 1.2s cubic-bezier(0.16,1,0.3,1); width:0; position:relative; }
  .bar-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; background:#fff; opacity:0.8; animation:barPulse 1.5s ease infinite; }

  /* PANELS ROW */
  .panels { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  @media(max-width:660px){ .panels{ grid-template-columns:1fr; } }

  /* PANEL */
  .panel { background:var(--bg2); border:1px solid var(--border); overflow:hidden; }
  .panel-head { background:var(--bg3); padding:11px 18px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .panel-head .count { background:var(--bg4); border:1px solid var(--border); color:var(--dim); padding:1px 7px; font-size:10px; }
  .panel-body { padding:14px 16px; }

  /* PANEL SEARCH INPUT */
  .panel-search { display:flex; align-items:center; padding:7px 14px; background:var(--bg4); border-bottom:1px solid var(--border); gap:8px; }
  .panel-search-icon { color:var(--dim); font-size:14px; flex-shrink:0; }
  .panel-search input { flex:1; background:transparent; border:none; outline:none; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--text); letter-spacing:0.5px; }
  .panel-search input::placeholder { color:var(--dim); }
  .panel-search .clear-btn { background:none; border:none; cursor:pointer; color:var(--dim); font-size:13px; padding:0 2px; transition:color 0.2s; line-height:1; display:none; }
  .panel-search .clear-btn.visible { display:block; }
  .panel-search .clear-btn:hover { color:var(--accent2); }
  .panel-search-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); white-space:nowrap; letter-spacing:1px; min-width:50px; text-align:right; }

  /* VARS */
  .vars-scroll { max-height:280px; overflow-y:auto; }
  .var-row { display:flex; gap:10px; font-family:'Share Tech Mono',monospace; font-size:12px; padding:6px 16px; border-bottom:1px solid rgba(30,45,69,0.4); transition:background 0.15s; }
  .var-row:last-child { border-bottom:none; }
  .var-row:hover { background:rgba(0,212,255,0.04); }
  .var-row.hidden { display:none; }
  .var-key { color:var(--dim); flex-shrink:0; min-width:130px; }
  .var-val { color:var(--accent3); word-break:break-all; }
  .hl-match { background:rgba(0,212,255,0.2); color:#fff; }

  /* TAGS */
  .tags-wrap { display:flex; flex-wrap:wrap; gap:6px; padding:2px 0; }
  .tag { font-size:11px; font-family:'Share Tech Mono',monospace; padding:3px 10px; background:var(--bg3); border:1px solid var(--border); color:var(--dim); cursor:default; transition:all 0.2s; }
  .tag:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:0 2px 8px rgba(0,212,255,0.2); }

  /* PLAYERS TABLE */
  .player-table-wrap { background:var(--bg2); border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .player-table-scroll { max-height:320px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:var(--bg3); position:sticky; top:0; z-index:1; }
  th { text-align:left; padding:10px 16px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--dim); font-weight:400; border-bottom:1px solid var(--border); }
  td { padding:9px 16px; font-size:14px; font-weight:500; border-bottom:1px solid rgba(30,45,69,0.3); }
  tr:last-child td { border-bottom:none; }
  tbody tr { transition:background 0.15s; }
  tbody tr:hover td { background:rgba(0,212,255,0.04); }
  .ping-good { color:var(--accent3); }
  .ping-ok   { color:var(--accent); }
  .ping-bad  { color:var(--accent2); }
  .ping-ugly { color:#ff3b3b; }

  /* RESOURCES */
  .resources-panel { background:var(--bg2); border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .resources-grid-wrap { max-height:260px; overflow-y:auto; padding:14px 16px; }
  .resources-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .res-item { font-family:'Share Tech Mono',monospace; font-size:11px; padding:3px 9px; background:var(--bg3); border:1px solid var(--border); color:var(--dim); cursor:default; transition:all 0.2s; }
  .res-item:hover { border-color:var(--accent2); color:var(--accent2); }
  .res-item.hidden { display:none; }
  .res-match { background:rgba(255,107,53,0.18); color:var(--accent2); }
  .no-results { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--dim); padding:8px 0; letter-spacing:1px; display:none; }
  .no-results.visible { display:block; }

  /* CONNECT */
  .connect-section { display:flex; align-items:center; gap:16px; flex-wrap:wrap; padding:18px 24px; background:var(--bg2); border:1px solid var(--accent); box-shadow:0 0 30px rgba(0,212,255,0.08),inset 0 0 30px rgba(0,212,255,0.02); margin-bottom:16px; position:relative; overflow:hidden; }
  .connect-section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:scanline 3s ease infinite; }
  .connect-endpoint-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:5px; }
  .connect-endpoint { font-family:'Share Tech Mono',monospace; font-size:15px; color:var(--accent); letter-spacing:1px; }
  .connect-btns { display:flex; gap:10px; margin-left:auto; flex-wrap:wrap; }
  .btn-connect { background:transparent; border:1px solid; padding:11px 26px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; text-decoration:none; transition:all 0.25s; position:relative; overflow:hidden; }
  .btn-connect.primary   { border-color:var(--accent3); color:var(--accent3); }
  .btn-connect.secondary { border-color:var(--accent);  color:var(--accent); }
  .btn-connect::after { content:''; position:absolute; inset:0; transform:scaleX(0); transform-origin:left; transition:transform 0.25s; }
  .btn-connect.primary::after   { background:var(--accent3); }
  .btn-connect.secondary::after { background:var(--accent); }
  .btn-connect span { position:relative; z-index:1; }
  .btn-connect:hover span { color:var(--bg); }
  .btn-connect:hover::after { transform:scaleX(1); }

  /* LIVE DOT */
  .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent3); margin-right:7px; box-shadow:0 0 6px var(--accent3); animation:pulse 1.6s ease infinite; }

  /* KEYFRAMES */
  @keyframes fadeDown   { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes revealUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes avatarPop  { from{opacity:0;transform:scale(0.6)}        to{opacity:1;transform:scale(1)} }
  @keyframes pulse      { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }
  @keyframes spin       { to{transform:rotate(360deg)} }
  @keyframes shimmer    { 0%{background-position:0% 0} 100%{background-position:200% 0} }
  @keyframes barPulse   { 0%,100%{opacity:0.8} 50%{opacity:0.2} }
  @keyframes scanline   { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
</style>
</head>
<body>

<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<div class="wrapper">
  <div class="search-section">
    <div class="brand">// FiveM Network Scanner</div>
    <h1>SERVER <span class="hl">INTEL</span></h1>
    <div class="subtitle">ENTER SERVER ID OR CFX LINK TO BEGIN</div>
    <div class="search-box">
      <input type="text" id="serverInput" placeholder="bokeep  ·  cfx.re/join/bokeep" autocomplete="off" spellcheck="false" />
      <button onclick="fetchServer()"><span>SCAN</span></button>
    </div>
  </div>

  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">AWAITING TARGET ID</span>
  </div>

  <div id="result"></div>
</div>

<script>
const API = 'https://servers-frontend.fivem.net/api/servers/single/';

function extractCode(input) {
  input = input.trim();
  const m = input.match(/cfx\.re\/join\/([a-z0-9]+)/i) || input.match(/^([a-z0-9]+)$/i);
  return m ? m[1] : null;
}
function pingClass(p) {
  if (p < 80)  return 'ping-good';
  if (p < 150) return 'ping-ok';
  if (p < 250) return 'ping-bad';
  return 'ping-ugly';
}
function setStatus(msg, cls) {
  document.getElementById('status-bar').className = cls || '';
  document.getElementById('status-text').textContent = msg;
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlight(str, q, cls) {
  cls = cls || 'hl-match';
  if (!q) return esc(str);
  const escaped = esc(str);
  const re = new RegExp('(' + esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replace(re, `<span class="${cls}">$1</span>`);
}
function premiumLabel(p) {
  return { pt:'Platinum', au:'Gold', ag:'Silver' }[p] || p.toUpperCase();
}

document.getElementById('serverInput').addEventListener('keydown', e => { if (e.key==='Enter') fetchServer(); });

async function fetchServer() {
  const raw = document.getElementById('serverInput').value;
  const code = extractCode(raw);
  if (!code) { setStatus('// INVALID INPUT — enter server ID or cfx.re/join/ link', 'error'); return; }
  setStatus(`// SCANNING ${code.toUpperCase()}...`, 'loading');
  const res = document.getElementById('result');
  res.style.display = 'none'; res.innerHTML = '';
  try {
    const r = await fetch(API + code);
    if (!r.ok) throw new Error('Server not found (HTTP ' + r.status + ')');
    const json = await r.json();
    renderResult(json, code);
  } catch(e) { setStatus('// ERROR: ' + e.message, 'error'); }
}

function renderResult(json, code) {
  const d = json.Data;
  const v = d.vars || {};
  const players   = d.players   || [];
  const resources = d.resources || [];
  const tags = (v.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const pct  = Math.min(100, Math.round((d.clients / d.svMaxclients) * 100));
  const avgPing = players.length ? Math.round(players.reduce((s,p)=>s+p.ping,0)/players.length) : 0;
  const safeVars = Object.entries(v).filter(([k,val])=>val&&!['banner_connecting','banner_detail'].includes(k));

  let html = '';

  if (v.banner_detail)
    html += `<div class="banner-wrap"><img src="${esc(v.banner_detail)}" alt="banner" onerror="this.parentElement.style.display='none'"><div class="banner-overlay"></div></div>`;

  html += `
  <div class="main-card">
    <div class="server-header">
      ${d.ownerAvatar?`<img class="owner-avatar" src="${esc(d.ownerAvatar)}" alt="owner">`:''}
      <div class="server-title">
        <div class="server-name">${esc(d.hostname)}</div>
        ${v.sv_projectDesc?`<div class="server-desc">${esc(v.sv_projectDesc)}</div>`:''}
        <div class="badge-row">
          ${v.premium?`<span class="badge premium">★ ${premiumLabel(v.premium)}</span>`:''}
          ${v.locale?`<span class="badge locale">${esc(v.locale)}</span>`:''}
          ${v.onesync_enabled==='true'?`<span class="badge onesync">OneSync ON</span>`:''}
          ${v.sv_enforceGameBuild?`<span class="badge gamebuild">Build ${esc(v.sv_enforceGameBuild)}</span>`:''}
        </div>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-cell"><div class="stat-label">Players</div><div class="stat-value accent">${d.clients}</div></div>
    <div class="stat-cell"><div class="stat-label">Max Slots</div><div class="stat-value">${d.svMaxclients}</div></div>
    <div class="stat-cell"><div class="stat-label">Capacity</div><div class="stat-value ${pct>80?'accent2':pct>50?'accent':'accent3'}">${pct}%</div></div>
    <div class="stat-cell"><div class="stat-label">Game Type</div><div class="stat-value" style="font-size:16px">${esc(d.gametype)}</div></div>
    <div class="stat-cell"><div class="stat-label">Map</div><div class="stat-value" style="font-size:14px">${esc(d.mapname)}</div></div>
    <div class="stat-cell"><div class="stat-label">Avg Ping</div><div class="stat-value ${pingClass(avgPing)}">${avgPing}ms</div></div>
    <div class="stat-cell"><div class="stat-label">Resources</div><div class="stat-value accent2">${resources.length}</div></div>
    <div class="stat-cell"><div class="stat-label">Owner</div><div class="stat-value" style="font-size:15px">${esc(d.ownerName||code)}</div></div>
  </div>

  <div class="player-bar-wrap">
    <div class="player-bar-label"><span>PLAYER LOAD</span><span>${d.clients} / ${d.svMaxclients} &nbsp;(${pct}%)</span></div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head">Server Variables <span class="count" id="varsCount">${safeVars.length}</span></div>
      <div class="panel-search">
        <span class="panel-search-icon">⌕</span>
        <input type="text" id="varSearch" placeholder="search variables..." oninput="filterVars()" autocomplete="off" spellcheck="false" />
        <button class="clear-btn" id="varClear" onclick="clearVarSearch()">✕</button>
        <span class="panel-search-count" id="varSearchCount"></span>
      </div>
      <div class="vars-scroll" id="varsList">
        ${safeVars.map(([k,val])=>`<div class="var-row" data-key="${esc(k)}" data-val="${esc(String(val))}"><span class="var-key">${esc(k)}</span><span class="var-val">${esc(String(val).substring(0,80))}${String(val).length>80?'…':''}</span></div>`).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">Tags <span class="count">${tags.length}</span></div>
      <div class="panel-body">
        <div class="tags-wrap">
          ${tags.length?tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(''):`<span style="color:var(--dim);font-size:13px;font-family:'Share Tech Mono',monospace">No tags</span>`}
        </div>
      </div>
    </div>
  </div>

  <div class="player-table-wrap">
    <div class="panel-head">
      <span><span class="live-dot"></span>Online Players</span>
      <span class="count">${players.length} listed</span>
    </div>
    <div class="panel-search">
      <span class="panel-search-icon">⌕</span>
      <input type="text" id="playerSearch" placeholder="search players..." oninput="filterPlayers()" autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="playerClear" onclick="clearPlayerSearch()">✕</button>
      <span class="panel-search-count" id="playerSearchCount"></span>
    </div>
    <div class="player-table-scroll">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>ID</th><th>Ping</th></tr></thead>
        <tbody id="playerBody">${renderPlayerRows(players)}</tbody>
      </table>
    </div>
  </div>

  <div class="resources-panel">
    <div class="panel-head">Resources <span class="count" id="resCount">${resources.length}</span></div>
    <div class="panel-search">
      <span class="panel-search-icon">⌕</span>
      <input type="text" id="resSearch" placeholder="search resources..." oninput="filterResources()" autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="resClear" onclick="clearResSearch()">✕</button>
      <span class="panel-search-count" id="resSearchCount"></span>
    </div>
    <div class="resources-grid-wrap">
      <div class="resources-grid" id="resGrid">
        ${resources.map(r=>`<span class="res-item" data-name="${esc(r)}">${esc(r)}</span>`).join('')}
      </div>
      <div class="no-results" id="resNoResults">// No matching resources</div>
    </div>
  </div>

  <div class="connect-section">
    <div>
      <div class="connect-endpoint-label">Connect Endpoint</div>
      <div class="connect-endpoint">${esc((d.connectEndPoints||[code])[0])}</div>
    </div>
    <div class="connect-btns">
      <a class="btn-connect primary"   href="fivem://connect/${esc((d.connectEndPoints||[code])[0])}"><span>⬢ CONNECT</span></a>
      <a class="btn-connect secondary" href="https://cfx.re/join/${code}" target="_blank"><span>CFX LINK</span></a>
    </div>
  </div>`;

  window._allPlayers   = players;
  window._allResources = resources;
  window._allVars      = safeVars;

  const container = document.getElementById('result');
  container.innerHTML = html;
  container.style.display = 'block';
  setStatus(`// ${code.toUpperCase()} — ${d.clients} players online`, 'success');

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fill = document.getElementById('barFill');
    if (fill) fill.style.width = pct + '%';
  }));
}

/* PLAYER ROWS */
function renderPlayerRows(players, q) {
  if (!players.length) return `<tr><td colspan="4" style="text-align:center;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:12px;padding:20px">// No players found</td></tr>`;
  return players.map((p,i)=>`
    <tr>
      <td style="color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px">${i+1}</td>
      <td>${highlight(p.name,q)}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)">${p.id}</td>
      <td class="${pingClass(p.ping)}" style="font-family:'Share Tech Mono',monospace;font-size:12px">${p.ping}ms</td>
    </tr>`).join('');
}

/* FILTER PLAYERS */
function filterPlayers() {
  const q = document.getElementById('playerSearch').value.toLowerCase();
  const filtered = (window._allPlayers||[]).filter(p=>p.name.toLowerCase().includes(q));
  document.getElementById('playerBody').innerHTML = renderPlayerRows(filtered, q);
  document.getElementById('playerClear').classList.toggle('visible', q.length>0);
  document.getElementById('playerSearchCount').textContent = q ? `${filtered.length}/${(window._allPlayers||[]).length}` : '';
}
function clearPlayerSearch() { document.getElementById('playerSearch').value=''; filterPlayers(); }

/* FILTER RESOURCES */
function filterResources() {
  const q = document.getElementById('resSearch').value.toLowerCase();
  const items = document.querySelectorAll('#resGrid .res-item');
  let shown = 0;
  items.forEach(el => {
    const name = el.dataset.name.toLowerCase();
    const match = name.includes(q);
    el.classList.toggle('hidden', !match);
    if (match) { el.innerHTML = highlight(el.dataset.name, q, 'res-match'); shown++; }
  });
  document.getElementById('resNoResults').classList.toggle('visible', shown===0 && q.length>0);
  document.getElementById('resClear').classList.toggle('visible', q.length>0);
  document.getElementById('resSearchCount').textContent = q ? `${shown}/${(window._allResources||[]).length}` : '';
  document.getElementById('resCount').textContent = q ? shown : (window._allResources||[]).length;
}
function clearResSearch() { document.getElementById('resSearch').value=''; filterResources(); }

/* FILTER VARS */
function filterVars() {
  const q = document.getElementById('varSearch').value.toLowerCase();
  const rows = document.querySelectorAll('#varsList .var-row');
  let shown = 0;
  rows.forEach(row => {
    const match = row.dataset.key.toLowerCase().includes(q) || row.dataset.val.toLowerCase().includes(q);
    row.classList.toggle('hidden', !match);
    if (match) {
      row.querySelector('.var-key').innerHTML = highlight(row.dataset.key, q);
      const v = row.dataset.val;
      row.querySelector('.var-val').innerHTML = highlight(v.substring(0,80), q) + (v.length>80?'…':'');
      shown++;
    }
  });
  document.getElementById('varClear').classList.toggle('visible', q.length>0);
  document.getElementById('varSearchCount').textContent = q ? `${shown}/${(window._allVars||[]).length}` : '';
  document.getElementById('varsCount').textContent = q ? shown : (window._allVars||[]).length;
}
function clearVarSearch() { document.getElementById('varSearch').value=''; filterVars(); }
</script>
</body>
</html>
