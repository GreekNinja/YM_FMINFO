<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM Server Info</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #161b24;
    --border: #1e2840;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --text: #c8d8f0;
    --text-dim: #5a7090;
    --premium: #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .corner-deco {
    position: fixed;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 100;
  }
  .corner-deco::before, .corner-deco::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .corner-deco::before { width: 2px; height: 40px; }
  .corner-deco::after  { width: 40px; height: 2px; }
  .corner-deco.tl { top: 16px; left: 16px; }
  .corner-deco.tl::before { top:0; left:0; }
  .corner-deco.tl::after  { top:0; left:0; }
  .corner-deco.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner-deco.tr::before { top:0; left:0; }
  .corner-deco.tr::after  { top:0; left:0; }
  .corner-deco.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner-deco.bl::before { top:0; left:0; }
  .corner-deco.bl::after  { top:0; left:0; }
  .corner-deco.br { bottom: 16px; right: 16px; transform: scale(-1); }
  .corner-deco.br::before { top:0; left:0; }
  .corner-deco.br::after  { top:0; left:0; }

  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* ─── SEARCH BAR ─── */
  .search-section {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.5s ease;
  }
  .brand {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }
  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.3);
    margin-bottom: 24px;
  }
  h1 span { color: var(--accent); }

  .search-box {
    display: flex;
    gap: 0;
    max-width: 560px;
    margin: 0 auto;
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
  }
  .search-box input {
    flex: 1;
    background: var(--bg2);
    border: none;
    outline: none;
    padding: 14px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 1px;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box button {
    background: var(--accent);
    border: none;
    padding: 14px 28px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bg);
    transition: background 0.2s;
  }
  .search-box button:hover { background: #fff; }

  /* ─── STATUS BAR ─── */
  #status-bar {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 24px;
    margin-bottom: 16px;
    transition: color 0.3s;
  }
  #status-bar.loading { color: var(--accent); }
  #status-bar.error   { color: var(--accent2); }
  #status-bar.success { color: var(--accent3); }

  /* ─── RESULTS ─── */
  #result { display: none; animation: fadeUp 0.4s ease; }

  /* Banner */
  .banner-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    margin-bottom: -1px;
    background: var(--bg3);
  }
  .banner-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
  }

  /* Main card */
  .main-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 28px 32px;
    position: relative;
    margin-bottom: 20px;
  }
  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .server-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 24px;
  }
  .owner-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .server-title { flex: 1; }
  .server-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1.1;
  }
  .server-desc {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border: 1px solid;
    text-transform: uppercase;
  }
  .badge.premium  { border-color: var(--premium); color: var(--premium); }
  .badge.locale   { border-color: var(--accent);  color: var(--accent); }
  .badge.onesync  { border-color: var(--accent3); color: var(--accent3); }
  .badge.gamebuild{ border-color: var(--accent2); color: var(--accent2); }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .stat-cell {
    background: var(--bg2);
    padding: 16px 18px;
    position: relative;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .stat-value.accent  { color: var(--accent); }
  .stat-value.accent2 { color: var(--accent2); }
  .stat-value.accent3 { color: var(--accent3); }

  /* Player bar */
  .player-bar-wrap {
    margin-bottom: 20px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
  }
  .player-bar-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .player-bar-label span:last-child { color: var(--accent); }
  .bar-track {
    height: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
    width: 0;
  }

  /* Panels row */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 660px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .panel-head {
    background: var(--bg3);
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 14px 16px; }

  /* Vars list */
  .var-row {
    display: flex;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(30,40,64,0.5);
    overflow: hidden;
  }
  .var-row:last-child { border-bottom: none; }
  .var-key { color: var(--text-dim); flex-shrink: 0; }
  .var-val { color: var(--accent3); word-break: break-all; }

  /* Tags */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    padding: 3px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }

  /* Players table */
  .player-table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .player-search-wrap {
    padding: 10px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .player-search-wrap input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    outline: none;
    padding: 7px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }
  .player-search-wrap input:focus { border-color: var(--accent); }
  .player-table-scroll { max-height: 340px; overflow-y: auto; }
  .player-table-scroll::-webkit-scrollbar { width: 4px; }
  .player-table-scroll::-webkit-scrollbar-track { background: var(--bg3); }
  .player-table-scroll::-webkit-scrollbar-thumb { background: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); }
  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-weight: 400;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 500;
    border-bottom: 1px solid rgba(30,40,64,0.4);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,0.04); }
  .ping-good { color: var(--accent3); }
  .ping-ok   { color: var(--accent); }
  .ping-bad  { color: var(--accent2); }
  .ping-ugly { color: #ff3b3b; }

  /* Resources panel */
  .resources-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-height: 220px;
    overflow-y: auto;
  }
  .resources-grid::-webkit-scrollbar { width: 3px; }
  .resources-grid::-webkit-scrollbar-thumb { background: var(--accent); }
  .res-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  /* Connect */
  .connect-section {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--bg2);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,212,255,0.08);
    margin-bottom: 20px;
  }
  .connect-endpoint {
    flex: 1;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--accent);
  }
  .btn-connect {
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    padding: 10px 24px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-connect:hover {
    background: var(--accent3);
    color: var(--bg);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
</style>
</head>
<body>

<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<div class="wrapper">
  <div class="search-section">
    <div class="brand">// FiveM Network</div>
    <h1>SERVER <span>INTEL</span></h1>
    <div class="search-box">
      <input type="text" id="serverInput" placeholder="bokeep  or  cfx.re/join/bokeep" />
      <button onclick="fetchServer()">SCAN</button>
    </div>
  </div>

  <div id="status-bar">AWAITING TARGET ID</div>
  <div id="result"></div>
</div>

<script>
const API = 'https://servers-frontend.fivem.net/api/servers/single/';

function extractCode(input) {
  input = input.trim();
  const m = input.match(/cfx\.re\/join\/([a-z0-9]+)/i) || input.match(/^([a-z0-9]+)$/i);
  return m ? m[1] : null;
}

function pingClass(p) {
  if (p < 80)  return 'ping-good';
  if (p < 150) return 'ping-ok';
  if (p < 250) return 'ping-bad';
  return 'ping-ugly';
}

function setStatus(msg, cls) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = cls || '';
}

async function fetchServer() {
  const raw = document.getElementById('serverInput').value;
  const code = extractCode(raw);
  if (!code) { setStatus('// INVALID INPUT — enter server ID or cfx.re/join/ link', 'error'); return; }

  setStatus(`// SCANNING ${code.toUpperCase()}...`, 'loading');
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch(API + code);
    if (!res.ok) throw new Error('Server not found (HTTP ' + res.status + ')');
    const json = await res.json();
    renderResult(json, code);
  } catch (e) {
    setStatus('// ERROR: ' + e.message, 'error');
  }
}

document.getElementById('serverInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchServer();
});

function renderResult(json, code) {
  const d = json.Data;
  const v = d.vars || {};
  const players = d.players || [];
  const resources = d.resources || [];
  const tags = (v.tags || '').split(',').map(t => t.trim()).filter(Boolean);
  const pct = Math.round((d.clients / d.svMaxclients) * 100);
  const avgPing = players.length ? Math.round(players.reduce((s,p)=>s+p.ping,0)/players.length) : 0;

  const container = document.getElementById('result');
  container.innerHTML = `
    ${v.banner_detail ? `<div class="banner-wrap"><img src="${v.banner_detail}" alt="banner" onerror="this.style.display='none'"><div class="banner-overlay"></div></div>` : ''}

    <div class="main-card">
      <div class="server-header">
        ${d.ownerAvatar ? `<img class="owner-avatar" src="${d.ownerAvatar}" alt="owner">` : ''}
        <div class="server-title">
          <div class="server-name">${escHtml(d.hostname)}</div>
          <div class="server-desc">${escHtml(v.sv_projectDesc || '')}</div>
          <div class="badge-row">
            ${v.premium ? `<span class="badge premium">★ ${premiumLabel(v.premium)}</span>` : ''}
            ${v.locale   ? `<span class="badge locale">${escHtml(v.locale)}</span>` : ''}
            ${v.onesync_enabled === 'true' ? `<span class="badge onesync">OneSync</span>` : ''}
            ${v.sv_enforceGameBuild ? `<span class="badge gamebuild">Build ${escHtml(v.sv_enforceGameBuild)}</span>` : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-label">Players</div>
        <div class="stat-value accent">${d.clients}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Max Slots</div>
        <div class="stat-value">${d.svMaxclients}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Capacity</div>
        <div class="stat-value ${pct>80?'accent2':pct>50?'accent':'accent3'}">${pct}%</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Game Type</div>
        <div class="stat-value" style="font-size:16px">${escHtml(d.gametype)}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Map</div>
        <div class="stat-value" style="font-size:14px">${escHtml(d.mapname)}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Avg Ping</div>
        <div class="stat-value ${pingClass(avgPing)}">${avgPing}ms</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Resources</div>
        <div class="stat-value accent2">${resources.length}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Owner</div>
        <div class="stat-value" style="font-size:14px">${escHtml(d.ownerName || code)}</div>
      </div>
    </div>

    <div class="player-bar-wrap">
      <div class="player-bar-label">
        <span>PLAYER LOAD</span>
        <span>${d.clients} / ${d.svMaxclients} (${pct}%)</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-head">Server Variables <span>${Object.keys(v).length}</span></div>
        <div class="panel-body" style="max-height:220px;overflow-y:auto">
          ${Object.entries(v).filter(([k,val])=>val&&!['banner_connecting','banner_detail'].includes(k)).map(([k,val])=>`
            <div class="var-row">
              <span class="var-key">${escHtml(k)}</span>
              <span class="var-val">${escHtml(String(val).substring(0,60))}${val.length>60?'…':''}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">Tags</div>
        <div class="panel-body">
          <div class="tags-wrap">
            ${tags.length ? tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('') : '<span style="color:var(--text-dim);font-size:13px">No tags</span>'}
          </div>
        </div>
      </div>
    </div>

    <div class="player-table-wrap">
      <div class="panel-head" style="padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border)">
        <span><span class="live-dot"></span>ONLINE PLAYERS</span>
        <span style="color:var(--text-dim)">${players.length} listed</span>
      </div>
      <div class="player-search-wrap">
        <input type="text" id="playerSearch" placeholder="Filter players..." oninput="filterPlayers()" />
      </div>
      <div class="player-table-scroll">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>ID</th><th>Ping</th></tr></thead>
          <tbody id="playerBody">
            ${renderPlayerRows(players)}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel" style="margin-bottom:20px">
      <div class="panel-head">Resources <span>${resources.length}</span></div>
      <div class="panel-body">
        <div class="resources-grid">
          ${resources.map(r=>`<span class="res-item">${escHtml(r)}</span>`).join('')}
        </div>
      </div>
    </div>

    <div class="connect-section">
      <div>
        <div style="font-size:11px;letter-spacing:2px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-bottom:4px">CONNECT ENDPOINT</div>
        <div class="connect-endpoint">${escHtml((d.connectEndPoints||[code])[0])}</div>
      </div>
      <a class="btn-connect" href="fivem://connect/${(d.connectEndPoints||[code])[0]}">CONNECT</a>
      <a class="btn-connect" href="https://cfx.re/join/${code}" target="_blank">CFX LINK</a>
    </div>
  `;

  window._allPlayers = players;
  container.style.display = 'block';
  setStatus(`// ${code.toUpperCase()} — ${d.clients} players online`, 'success');

  setTimeout(() => {
    const fill = document.getElementById('barFill');
    if (fill) fill.style.width = pct + '%';
  }, 100);
}

function renderPlayerRows(players) {
  return players.map((p, i) => `
    <tr>
      <td style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:12px">${i+1}</td>
      <td>${escHtml(p.name)}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim)">${p.id}</td>
      <td class="${pingClass(p.ping)}" style="font-family:'Share Tech Mono',monospace;font-size:13px">${p.ping}ms</td>
    </tr>`).join('');
}

function filterPlayers() {
  const q = document.getElementById('playerSearch').value.toLowerCase();
  const filtered = (window._allPlayers||[]).filter(p => p.name.toLowerCase().includes(q));
  document.getElementById('playerBody').innerHTML = renderPlayerRows(filtered);
}

function premiumLabel(p) {
  const map = { pt: 'Platinum', au: 'Gold', ag: 'Silver' };
  return map[p] || p.toUpperCase();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
